services:
  # ── BACKEND (Node.js / Express) ────────────────────────────────────
  - type: web
    name: yap-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── FRONTEND (Vite / React → Static Site) ──────────────────────────
  - type: web
    name: yap-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://yap-contabilidad-pol-1.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
